<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->


        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS

            // Aliases for convenience
            const { Engine, World, Bodies, Runner, Composite } = Matter;

            let engine, world, box;

            class water{
                constructor(x,y){
                    this.x = x
                    this.y = y
                    this.moveX = random(-10,-10)
                    this.moveY = random(-10,10)
                    this.multiX;
                    this.multiY;
                    this.state = "liquid"
                    this.counter = 0;
                }
                make(){
                    if (random(probability) > 90 && random(probability) > 90 && random(probability) > 90 && this.counter == 0){
                        this.state = "liquid"
                        this.counter++
                    }
                    else if  (this.counter == 1){
                        this.counter++
                        this.state = "gas"
                        this.moveX = random(-10,-10)
                        this.moveY = random(-10,10)
                    }
                    if (this.state == "liquid"){
                        fill(255,0,0)
                        ellipse(this.x,this.y,62.5)
                        fill(255)
                        ellipse(this.x - 31.25,this.y + 31.25,31.25)
                        ellipse(this.x + 31.25,this.y + 31.25,31.25)
                    }
                    else{
                        fill(255)
                        ellipse(this.x,height-this.y + 31.25,31.25)
                        ellipse(this.x,height-this.y,31.25)
                        counterGas++
                        if (counterGas == 2){
                            fill(255,0,0)
                            ellipse(this.x+100,height-this.y, 62.5)
                            ellipse(this.x+162.5,height-this.y, 62.5)
                            counterGas = 0
                        }
                    }
                }
                movement(){
                    this.x += this.moveX
                    this.y += this.moveY
                    if (this.x > width - 25 || this.x < 25){
                        this.multiX = random(-0.8,-1.2)
                        // if (this.multiX > -0.4 && this.multiX < 0.4){
                        //     this.multiX = random(-0.8,-1.2)
                        // }
                        this.moveX *= this.multiX
                    }
                    if (this.state == "liquid"){
                        if (this.y > height - 31.25 || this.y < height/2 + 25){
                            this.multiY = random(-0.8,-1.2)
                            // if (this.multiY > -0.4 && this.multiY < 0.4){
                            //     this.multiY = random(-0.8, -1.2)
                            // }
                            this.moveY *= this.multiY
                        }
                    }
                    else{
                        if (this.y > height/2 || this.y < 0){
                            this.multiY = random(-0.8,-1.2)
                            // if (this.multiY > -0.4 && this.multiY < 0.4){
                            //     this.multiY = random(-0.8, -1.2)
                            // }
                            this.moveY *= this.multiY
                        }
                    }
                }
            }
            var initial = 25
            var temperature;
            var molecules = []
            var probability;
            var counterGas = 0;
            function setup() {
                Matter.Engine.create() 
                world = engine.world;

                angleMode(DEGREES)
                createCanvas(800, 600);
                for (var i = 0;i < 10;i++){
                    molecules.push(new water(random(50,width-50),random(height/2 + 31.25,height - 50)))
                }

                Runner.run(engine);
                
            }

            function draw() {
                temperature = initial + " °C"
                probability = frameCount/4
                console.log(probability)
                background(200,200,255)
                fill(255,100,100)
                textSize(50)
                text(temperature,25,50)
                fill(255,100,100)
                textSize(50)
                text(temperature,25,50)
                // text(degrees, 85, 50)
                fill(100,100,255)
                rect(0, height/2, width)
                if (frameCount % 5 == 0 && frameCount > 30){
                    initial++
                }
                for (var i = 0;i < molecules.length;i++){
                    molecules[i].make()
                    molecules[i].movement()
                }
            }

        </script>
    </body>
</html>
