<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS
            class water{
                constructor(x,y){
                    this.x = x
                    this.y = y
                    this.moveX = random(-10,-10)
                    this.moveY = random(-10,10)
                    this.rotate = random(0,360)
                }
                make(){
                    fill(255,0,0)
                    translate(width/2,height/2)
                    rotate(this.rotate)
                    ellipse(this.x,this.y,75)
                    fill(255)
                    ellipse(this.x - 37.5,this.y + 37.5,37.5)
                    ellipse(this.x + 37.5,this.y + 37.5,37.5)
                }
                movement(){
                    this.x += this.moveX
                    this.y += this.moveY
                    if (this.x > width - 25 || this.x < 25){
                        this.moveX *= random(-0.8,-1.2)
                    }
                    if (this.y > height - 25 || this.y < 25){
                        this.moveY *= random(-0.8,-1.2)
                    }
                }
            }
            var molecules = []
            function setup() {
                angleMode(DEGREES)
                createCanvas(800, 600);
                for (var i = 0;i < 10;i++){
                    molecules.push(new water(random(50,width-50),random(50,height - 50)))
                }
            }

            function draw() {
                background(200,200,255)
                for (var i = 0;i < molecules.length;i++){
                    molecules[i].make()
                    molecules[i].movement()
                }
            }

        </script>
    </body>
</html>
