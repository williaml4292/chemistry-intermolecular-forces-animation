<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
        </style>

        <title>Title</title>
    </head>
    <body>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>

            let Engine = Matter.Engine,
                World = Matter.World,
                Bodies = Matter.Bodies,
                Runner = Matter.Runner;

            let hydrogenBonds = [];
            let molecules = [];

            let engine;
            let world;

            let initial = 25;
            let probability = 0;
            let temperature = 0;

            // collision filters
            const LIQUID = 0x0001;
            const GAS    = 0x0002;
            const WALL   = 0x0004;

            class water {
                constructor(x, y) {
                    this.state = "liquid";   // "liquid" or "gas"
                    this.counter = 0;

                    const angle = radians(45);
                    const O_RADIUS = 30;
                    const H_RADIUS = 15;
                    const H_OFFSET = 45;

                    let oxygen = Bodies.circle(x, y, O_RADIUS, {
                        label: "oxygen",
                        restitution: 0.8,
                        friction: 0,
                        frictionStatic: 0,
                        frictionAir: 0,
                        collisionFilter: {
                            category: LIQUID,
                            mask: WALL | LIQUID | GAS
                        }
                    });

                    const baseAngle = PI/2 + angle;     // rotate downward
                    const baseAngle2 = PI/2 - angle;    // symmetric downward

                    let hx1 = x + cos(baseAngle) * H_OFFSET;
                    let hy1 = y + sin(baseAngle) * H_OFFSET;

                    let hx2 = x + cos(baseAngle2) * H_OFFSET;
                    let hy2 = y + sin(baseAngle2) * H_OFFSET;

                    let hydrogen1 = Bodies.circle(hx1, hy1, H_RADIUS, {
                        label: "hydrogen",
                        collisionFilter: oxygen.collisionFilter
                    });

                    let hydrogen2 = Bodies.circle(hx2, hy2, H_RADIUS, {
                        label: "hydrogen",
                        collisionFilter: oxygen.collisionFilter
                    });

                    this.body = Matter.Body.create({
                        parts: [oxygen, hydrogen1, hydrogen2],
                        frictionAir: 0,
                        restitution: 0.8
                    });

                    Matter.Body.setVelocity(this.body, {
                        x: random(-1.5, 1.5),
                        y: random(-1.5, 1.5)
                    });

                    this.body.label = "water";
                    this.body.parentObject = this;

                    World.add(world, this.body);
                }

                make() {
                    // liquid → gas trigger (you can later replace this with temperature logic)
                    if (
                        random(probability) > 110 &&
                        random(probability) > 110 &&
                        random(probability) > 110 &&
                        this.state === "liquid"
                    ) {
                        this.becomeGas();
                    }
                }

                becomeGas() {
                    this.state = "gas";

                    // remove all hydrogen bonds connected to this molecule
                    for (let i = hydrogenBonds.length - 1; i >= 0; i--) {
                        let bond = hydrogenBonds[i];
                        if (bond.a === this || bond.b === this) {
                            World.remove(world, bond.constraint);
                            hydrogenBonds.splice(i, 1);
                        }
                    }

                    Matter.Body.setPosition(this.body, {
                        x: this.body.position.x,
                        y: random(50, height * 0.65 - 50)
                    });

                    // change collision category to GAS
                    this.body.collisionFilter.category = GAS;
                    this.body.collisionFilter.mask = WALL | LIQUID | GAS;

                    // give it a gas‑like kick
                    Matter.Body.setVelocity(this.body, {
                        x: random(-3, 3),
                        y: random(-3, 3)
                    });

                    // lighter drag for gas
                    this.body.frictionAir = 0.001;
                }

                show() {
                    let pos = this.body.position;
                    let angle = this.body.angle;

                    push();
                    translate(pos.x, pos.y);
                    rotate(angle);


                    // show molecule in p5js
                    fill(255, 0, 0); // Oxygen
                    ellipse(0, 0, 62.5);

                    fill(255); // Hydrogens
                    ellipse(-31.25, 31.25, 31.25);
                    ellipse(31.25, 31.25, 31.25);

                    pop();
                }

                movement() {
                    if (!this.body || !this.body.velocity) return;

                    if (this.state === "liquid") {
                        // optional: viscosity, damping, etc.
                    } else if (this.state === "gas") {
                        // tiny random jitter to keep gas moving
                        Matter.Body.applyForce(this.body, this.body.position, {
                            x: (Math.random() - 0.5) * 0.0003,
                            y: (Math.random() - 0.5) * 0.0003
                        });
                        Matter.Body
                    }
                }
            }

            function setup() {
                engine = Engine.create();
                world = engine.world;
                engine.gravity.scale = 0;

                createCanvas(1000, 650);

                for (let i = 0; i < 10; i++) {
                    molecules.push(new water(
                        random(50, width - 50),
                        random(height * 0.65 + 31.25, height - 50)
                    ));
                }

                let sideWalls = {
                    isStatic: true,
                    collisionFilter: { category: WALL, mask: LIQUID | GAS }
                };

                World.add(world, [
                    Bodies.rectangle(width / 2, height + 50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS}
                    }),
                    Bodies.rectangle(width / 2, -50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    }),

                    Bodies.rectangle(-50, height / 2, 100, height, sideWalls),
                    Bodies.rectangle(width + 50, height / 2, 100, height, sideWalls),

                    Bodies.rectangle(width / 2, height * 0.65, width, 20, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    })
                ]);

                engine.world.bounds = {
                    min: { x: 0, y: 0 },
                    max: { x: width, y: height }
                };

                frameRate(60);
                Engine.update(engine, 1000 / 60);
                Runner.run(engine);
            }

            function draw() {
                temperature = initial + " °C";
                probability = min(frameCount / 4, 500);

                background(200, 200, 255);

                fill(255, 100, 100);
                textSize(50);
                text(temperature, 25, 50);

                fill(100, 100, 255);
                rect(0, height * 0.65, width);

                // Draw hydrogen bonds
                stroke(150, 150, 255, 200);
                strokeWeight(7.5);

                for (let b of hydrogenBonds) {
                    let p1 = b.a.body.position;
                    let p2 = b.b.body.position;
                    line(p1.x, p1.y, p2.x, p2.y);
                }

                strokeWeight(1);
                stroke(0);

                if (frameCount % 5 == 0 && frameCount > 30) {
                    initial++;
                }

                for (let i = 0; i < molecules.length; i++) {
                    let m = molecules[i];

                    m.make();
                    m.movement();

                    // SLOW VELOCITY INCREASE
                    let v = m.body.velocity;
                    let speed = Math.sqrt(v.x*v.x + v.y*v.y) || 0.0001;

                    // calculate direction of forces
                    let nx = v.x / speed;
                    let ny = v.y / speed;

                    let newSpeed = (speed + 0.05 + (frameCount / (frameCount/(initial/25))));

                    let forceMagnitude = newSpeed * 0.0005;   // scale this number to tune acceleration

                    //  apply forces
                    Matter.Body.applyForce(m.body, m.body.position, {
                        x: nx * forceMagnitude,
                        y: ny * forceMagnitude
                    });

                    // random molecule gitter
                    if(temperature > 120) {
                        Matter.Body.applyForce(m.body, m.body.position, {
                            x: random(-0.001, 0.001),
                            y: random(-0.001, 0.001)
                        });
                    }

                    // Liquid water stays in BOTTOM half
                    if (m instanceof water && m.state === "liquid") {
                        if (m.body.position.y < height / 2) {
                            Matter.Body.setPosition(m.body, {
                                x: m.body.position.x,
                                y: height / 2 + 10
                            });
                            Matter.Body.setVelocity(m.body, {
                                x: m.body.velocity.x,
                                y: -m.body.velocity.y
                            });
                        }
                    }

                    handleHydrogenBonds();
                    m.show();

                    // // for debugging
                    // for (let m of molecules) {
                    //     debugMatterBody(m.body); // shows the REAL physics shape
                    //     m.show(); // your visual drawing
                    // }
                    avgSpeed() // test avg speed
                }
            }

            function handleHydrogenBonds() {
                const bondDistance = 80;      // when to form a bond
                const breakDistance = 140;    // when to break a bond
                const minDistance = 60;       // repulsion threshold

                // 1. Try to form new bonds
                for (let i = 0; i < molecules.length; i++) {
                    for (let j = i + 1; j < molecules.length; j++) {

                        let m1 = molecules[i];
                        let m2 = molecules[j];

                        // Only water molecules can bond
                        if (!(m1 instanceof water) || !(m2 instanceof water)) continue;

                        // ⭐ Gas water cannot bond
                        if (m1.state === "gas" || m2.state === "gas") continue;

                        // Already bonded?
                        if (hydrogenBonds.some(b =>
                            (b.a === m1 && b.b === m2) ||
                            (b.a === m2 && b.b === m1)
                        )) {
                            continue;
                        }

                        let d = distBodies(m1.body, m2.body);

                        // POSITION‑BASED REPULSION
                        if (d < minDistance) {
                            let dx = m2.body.position.x - m1.body.position.x;
                            let dy = m2.body.position.y - m1.body.position.y;

                            let mag = Math.sqrt(dx*dx + dy*dy) || 0.0001;
                            dx /= mag;
                            dy /= mag;

                            let force = 0.0002 * ((minDistance - d) ** 2);

                            // Limit the maximum repulsion force
                            const maxForce = 50;
                            force = Math.min(force, maxForce);

                            Matter.Body.applyForce(m1.body, m1.body.position, { x: -dx * force, y: -dy * force });
                            Matter.Body.applyForce(m2.body, m2.body.position, { x:  dx * force, y:  dy * force });

                            continue;
                        }

                        // Close enough to form a bond
                        if (d < bondDistance) {
                            let c = Matter.Constraint.create({
                                bodyA: m1.body,
                                bodyB: m2.body,
                                length: 150,
                                stiffness: 0.00002,   // weak like real hydrogen bonds
                                damping: 0.02
                            });

                            World.add(world, c);
                            hydrogenBonds.push({ a: m1, b: m2, constraint: c });
                        }
                    }
                }

                // Break bonds that stretch too far OR involve gas water
                for (let i = hydrogenBonds.length - 1; i >= 0; i--) {
                    let bond = hydrogenBonds[i];
                    let d = distBodies(bond.a.body, bond.b.body);

                    // If either molecule became gas → break bond immediately
                    if (bond.a.state === "gas" || bond.b.state === "gas" || d > breakDistance) {
                        World.remove(world, bond.constraint);
                        hydrogenBonds.splice(i, 1);
                    }
                }
            }

            function distBodies(b1, b2) {
                let dx = b1.position.x - b2.position.x;
                let dy = b1.position.y - b2.position.y;
                return Math.sqrt(dx*dx + dy*dy);
            }

            function debugMatterBody(body) {
                push();
                noFill();
                stroke(0, 255, 0);
                strokeWeight(2);

                for (let part of body.parts) {
                    if (part.circleRadius) {
                        // Draw circles
                        ellipse(part.position.x, part.position.y, part.circleRadius * 2);
                    } else {
                        // Draw polygons
                        beginShape();
                        for (let v of part.vertices) {
                            vertex(v.x, v.y);
                        }
                        endShape(CLOSE);
                    }
                }

                pop();
            }

            function avgSpeed() {
                let totalSpeed = 0;

                for (let m of molecules) {
                    let v = m.body.velocity;
                    let speed = Math.sqrt(v.x * v.x + v.y * v.y);
                    totalSpeed += speed;
                }

                let avgSpeed = totalSpeed / molecules.length;
                console.log("Avg Speed: " + avgSpeed);
            }



        </script>
    </body>
</html>
