<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->


        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS

            // Aliases for convenience
            let Engine = Matter.Engine,
                World = Matter.World,
                Bodies = Matter.Bodies,
                Runner = Matter.Runner;

            let engine;
            let world;

            class water {
                constructor(x, y) {
                    this.state = "liquid";
                    this.counter = 0;

                    this.body = Bodies.circle(x, y, 30, {
                        restitution: 0.8,
                        frictionAir: 0,
                        frictionStatic: 0,
                        friction: 0
                    });

                    World.add(world, this.body);
                }

                make() {
                    if (random(probability) > 90 && random(probability) > 90 && random(probability) > 90 && this.counter == 0) {
                        this.state = "liquid";
                        this.counter++;
                    }
                    else if (this.counter == 1) {
                        this.counter++;
                        this.state = "gas";

                        Matter.Body.setVelocity(this.body, {
                            x: random(-10, 10),
                            y: random(-10, 10)
                        });
                    }
                }

                show() {
                    let pos = this.body.position;

                    push();
                    translate(pos.x, pos.y);

                    if (this.state === "liquid") {
                        fill(255, 0, 0);
                        ellipse(0, 0, 62.5);
                        fill(255);
                        ellipse(-31.25, 31.25, 31.25);
                        ellipse(31.25, 31.25, 31.25);
                    } else {
                        fill(255);
                        ellipse(0, 0, 31.25);
                        ellipse(0, -31.25, 31.25);
                    }

                    pop();
                }

                // apply forces/velocities
                movement() {
                    if (!this.body || !this.body.velocity) return;  // prevent crashes

                    let pos = this.body.position;
                    let vel = this.body.velocity;

                    // if (this.state === "liquid") {
                    //     if (pos.y > height - 31.25 || pos.y < height / 2 + 25) {
                    //         Matter.Body.setVelocity(this.body, {
                    //             x: vel.x,
                    //             y: -vel.y
                    //         });
                    //     }
                    // } else {
                    //     // for liquid
                    //     if (pos.y > height / 2 || pos.y < 0 && this.state == "liquid") {
                    //         Matter.Body.setVelocity(this.body, {
                    //             x: vel.x,
                    //             y: -vel.y
                    //         });
                    //     }
                    //     // for gas
                    //     else if (pos.y < 0 || pos.y > height){
                    //         Matter.Body.setVelocity(this.body, {
                    //             x: vel.x,
                    //             y: -vel.y
                    //         }); 
                    //     }
                    // }
                }
            }


            var initial = 25;
            var temperature;
            var molecules = [];
            var probability;
            var counterGas = 0;
            function setup() {
                engine = Engine.create();
                world = engine.world;
                engine.gravity.scale = 0;
                
                angleMode(DEGREES)

                // create the molecules
                createCanvas(800, 600);
                for (var i = 0; i < 10; i++){
                    molecules.push(new water(random(50,width-50),random(height/2 + 31.25,height - 50)))
                }

                // walls to bounce off of
                let walls = { isStatic: true };
                    World.add(world, [
                        Bodies.rectangle(width/2, height, width, 40, walls),
                        Bodies.rectangle(width/2, 0, width, 40, walls),
                        Bodies.rectangle(0, height/2, 40, height, walls),
                        Bodies.rectangle(width, height/2, 40, height, walls)
                    ]
                );

                Runner.run(engine);  
            }

            function draw() {
                temperature = initial + " °C";
                probability = frameCount / 4;

                background(200, 200, 255);

                fill(255, 100, 100);
                textSize(50);
                text(temperature, 25, 50);

                fill(100, 100, 255);
                rect(0, height / 2, width);

                if (frameCount % 5 == 0 && frameCount > 30) {
                    initial++;
                }

                for (var i = 0;i < molecules.length;i++){
                    molecules[i].make();
                    molecules[i].movement();
                    molecules[i].show();
                }
            }
        </script>
    </body>
</html>
