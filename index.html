<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
        </style>

        <title>Title</title>
    </head>
    <body>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>

            let Engine = Matter.Engine,
                World = Matter.World,
                Bodies = Matter.Bodies,
                Runner = Matter.Runner;

            let engine;
            let world;

            // collision filters
            const LIQUID = 0x0001;
            const GAS    = 0x0002;
            const WALL   = 0x0004;

            class water {
                constructor(x, y) {
                    this.state = "liquid";
                    this.counter = 0;
                    this.body = Bodies.circle(x, y, 30, {
                        restitution: 0.8,
                        friction: 0,
                        frictionStatic: 0,
                        frictionAir: 0,
                        collisionFilter: {
                            category: LIQUID,
                            mask: WALL | LIQUID | GAS
                        }
                    });

                    Matter.Body.setVelocity(this.body, {
                        x: (Math.random() * 10) - 5,
                        y: (Math.random() * 10) - 5
                    });

                    World.add(world, this.body);
                }

                make() {
                    if (random(probability) > 90 && random(probability) > 90 && random(probability) > 90 && this.counter == 0) {
                        this.state = "liquid";
                        this.counter++;
                        this.body.collisionFilter.category = LIQUID;
                        this.body.collisionFilter.mask = WALL | LIQUID | GAS;
                    }
                    else if (this.counter == 1) {
                        this.counter++;
                        this.state = "gas";

                        Matter.Body.setVelocity(this.body, {
                            x: random(-10, 10),
                            y: random(-10, 10)
                        });

                        this.body.collisionFilter.category = GAS;
                        this.body.collisionFilter.mask = WALL | LIQUID | GAS;

                        // this.body.frictionAir = 0.005;
                    }
                }

                show() {
                    let pos = this.body.position;
                    let angle = this.body.angle;

                    push();
                    translate(pos.x, pos.y);
                    rotate(this.body.angle);

                    if (this.state === "liquid") {
                        fill(255, 0, 0);
                        ellipse(0, 0, 62.5);
                        fill(255);
                        ellipse(-31.25, 31.25, 31.25);
                        ellipse(31.25, 31.25, 31.25);
                    } else {
                        counterGas++
                        // O2
                        if(counterGas == 2){
                            counterGas = 0;
                            fill(255, 0, 0)
                            ellipse(0, -150, 62.5)
                            ellipse(-62.5, -150 ,62.5)
                        }
                        // H2
                        fill(255);
                        ellipse(121.25, 31.25, 31.25);
                        ellipse(90, 31.25, 31.25);
                    }

                    pop();
                }

                movement() {
                    if (!this.body || !this.body.velocity) return;

                    if (this.state == "liquid") {
                        // this.body.frictionAir = 0.05;
                    } else if (this.state == "gas") {
                        // this.body.frictionAir = 0.001;

                        Matter.Body.applyForce(this.body, this.body.position, {
                            x: (Math.random() - 0.5) * 0.0005,
                            y: (Math.random() - 0.5) * 0.0005
                        });
                    }
                }
            }

            var initial = 25;
            var temperature;
            var molecules = [];
            var probability;
            var counterGas = 0;

            function setup() {
                engine = Engine.create();
                world = engine.world;
                engine.gravity.scale = 0;

                createCanvas(800, 600);

                for (var i = 0; i < 10; i++){
                    molecules.push(new water(random(50,width-50),random(height/2 + 31.25,height - 50)))
                }

                let walls = { 
                    isStatic: true,
                    collisionFilter: { category: WALL }
                };

                let sideWalls = {
                    isStatic: true,
                    collisionFilter: { category: WALL, mask: LIQUID | GAS }
                };

                World.add(world, [
                    Bodies.rectangle(width/2, height+50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS}
                    }),
                    Bodies.rectangle(width/2, -50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    }),

                    // left + right walls (both states collide)
                    Bodies.rectangle(-50, height/2, 100, height, sideWalls),
                    Bodies.rectangle(width+50, height/2, 100, height, sideWalls),

                    // middle divider (both collide)
                    Bodies.rectangle(width/2, height/2, width, 40, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    })
                ]);

                engine.world.bounds = {
                    min: { x: 0, y: 0 },
                    max: { x: width, y: height }
                };
                

                Runner.run(engine);
            }

            function draw() {
                temperature = initial + " °C";

                /* FIXED: probability runaway */
                probability = min(frameCount / 4, 500);

                background(200, 200, 255);

                fill(255, 100, 100);
                textSize(50);
                text(temperature, 25, 50);

                fill(100, 100, 255);
                rect(0, height / 2, width);

                if (frameCount % 5 == 0 && frameCount > 30) {
                    initial++;
                }

                for (var i = 0; i < molecules.length; i++){
                    molecules[i].make();
                    molecules[i].movement();
                    molecules[i].show();
                }
            }
        </script>
    </body>
</html>
