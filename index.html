<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

        <title>Title</title>

    <body>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>

            let Engine = Matter.Engine,
                World = Matter.World,
                Bodies = Matter.Bodies,
                Runner = Matter.Runner;

            let hydrogenBonds = [];

            let engine;
            let world;

            // collision filters
            const LIQUID = 0x0001;
            const GAS    = 0x0002;
            const WALL   = 0x0004;

            class water {
                constructor(x, y) {
                    this.state = "liquid";
                    this.counter = 0;

                    
                    this.body = Bodies.circle(x, y, 30, {
                        restitution: 0.8,
                        friction: 0,
                        frictionStatic: 0,
                        frictionAir: 0,
                        collisionFilter: {
                            category: LIQUID,
                            mask: WALL | LIQUID | GAS
                        }
                    });

                    Matter.Body.setVelocity(this.body, {
                        x: random(-1.5, 1.5),
                        y: random(-1.5, 1.5)
                    });

                    this.body.label = "water";
                    this.body.parentObject = this;

                    World.add(world, this.body);
                }

                make() {

                    //  liquid → gas trigger
                    if (
                        random(probability) > 90 &&
                        random(probability) > 90 &&
                        random(probability) > 90 &&
                        this.counter === 0
                    ) {
                        this.counter++;
                        this.state = "liquid"; // stays liquid until next frame
                        return;
                    }

                    else if (this.counter === 1) {
                        this.counter++;

                        for (let i = hydrogenBonds.length - 1; i >= 0; i--) {
                            let bond = hydrogenBonds[i];
                            if (bond.a === this || bond.b === this) {
                                World.remove(world, bond.constraint);
                                hydrogenBonds.splice(i, 1);
                            }
                        }

                        // Save position before deleting body
                        let x = this.body.position.x;
                        let y = this.body.position.y;

                        // remove water molecule
                        World.remove(world, this.body);
                        molecules = molecules.filter(m => m !== this);

                        // make H2 and O2
                        let newO2 = new o2(x, y);
                        let newH2_1 = new h2(x + 40, y);
                        let newH2_2 = new h2(x - 40, y);

                        molecules.push(newO2, newH2_1, newH2_2);

                        return; // stop processing this deleted molecule
                    }

                    // Normal movement
                    this.movement();
                }

                show() {
                    let pos = this.body.position;
                    let angle = this.body.angle;

                    push();
                    translate(pos.x, pos.y);
                    rotate(angle);

                    if (this.state === "liquid") {
                        // Draw H2O molecule
                        fill(255, 0, 0); // Oxygen
                        ellipse(0, 0, 62.5);

                        fill(255); // Hydrogens
                        ellipse(-31.25, 31.25, 31.25);
                        ellipse(31.25, 31.25, 31.25);
                    }

                    pop();
                }

                movement() {
                    if (!this.body || !this.body.velocity) return;

                    if (this.state === "liquid") {
                        // Optional: add viscosity here
                    }
                }
            }

            class h2 {
                constructor(x, y) {
                    this.state = "gas";
                    this.counter = 0;
                    this.body = ellipseBody(x, y, 30, 15, 24, {
                        restitution: 0.8,
                        friction: 0,
                        frictionStatic: 0,
                        frictionAir: 0,
                        collisionFilter: {
                            category: GAS,
                            mask: WALL | LIQUID | GAS
                        }
                    });

                    Matter.Body.setVelocity(this.body, {
                        x: (Math.random() * 10),
                        y: (Math.random() * 10)
                    });

                    // for matter js collisions
                    this.body.label = "gas";
                    this.body.parentObject = this; // link back to the class instance


                    World.add(world, this.body);
                }

                make() {
                //     if (random(probability) > 90 && random(probability) > 90 && random(probability) > 90 && this.counter == 0) {
                //         this.state = "liquid";
                //         this.counter++;
                //         this.body.collisionFilter.category = LIQUID;
                //         this.body.collisionFilter.mask = WALL | LIQUID | GAS;
                //     }
                //     else if (this.counter == 1) {
                //         this.counter++;
                //         this.state = "gas";

                //         Matter.Body.setVelocity(this.body, {
                //             x: random(-10, 10),
                //             y: random(-10, 10)
                //         });

                //         this.body.collisionFilter.category = GAS;
                //         this.body.collisionFilter.mask = WALL | LIQUID | GAS;

                //         // this.body.frictionAir = 0.005;
                //     }
                }

                show() {
                    let pos = this.body.position;
                    let angle = this.body.angle;

                    push();
                    translate(pos.x, pos.y);
                    rotate(angle);

                    fill(255); // white hydrogen atoms
                    ellipse(-15.615, 0, 31.25);
                    ellipse(15.615, 0, 31.25);

                    pop();
                }

                movement() {
                    if (!this.body || !this.body.velocity) return;

                    if (this.state == "liquid") {
                        // this.body.frictionAir = 0.05;
                    } else if (this.state == "gas") {
                        // this.body.frictionAir = 0.001;

                        Matter.Body.applyForce(this.body, this.body.position, {
                            x: (Math.random() - 0.5) * 0.0005,
                            y: (Math.random() - 0.5) * 0.0005
                        });
                    }
                }
            }

            class o2 {
                constructor(x, y) {
                    this.state = "gas";
                    this.counter = 0;
                    this.body = ellipseBody(x, y, 60, 30, 24, {
                        restitution: 0.8,
                        friction: 0,
                        frictionStatic: 0,
                        frictionAir: 0,
                        collisionFilter: {
                            category: GAS,
                            mask: WALL | LIQUID | GAS
                        }
                    });

                    Matter.Body.setVelocity(this.body, {
                        x: (Math.random() * 10),
                        y: (Math.random() * 10)
                    });

                    // for matter js collisions
                    this.body.label = "gas";
                    this.body.parentObject = this; // link back to the class instance


                    World.add(world, this.body);
                }

                make() {
                
                }

                show() {
                    let pos = this.body.position;
                    let angle = this.body.angle;

                    push();
                    translate(pos.x, pos.y);
                    rotate(angle);

                    fill(255, 0, 0); // red oxygen atoms
                    ellipse(-31.25, 0, 62.5);
                    ellipse(31.25, 0, 62.5);

                    pop();
                }

                movement() {
                    if (!this.body || !this.body.velocity) return;

                    if (this.state == "liquid") {
                        // this.body.frictionAir = 0.05;
                    } else if (this.state == "gas") {
                        // this.body.frictionAir = 0.001;

                        Matter.Body.applyForce(this.body, this.body.position, {
                            x: (Math.random() - 0.5) * 0.0005,
                            y: (Math.random() - 0.5) * 0.0005
                        });
                    }
                }
            }

            function ellipseBody(x, y, rx, ry, sides = 24, options = {}) {
                const verts = [];
                for (let i = 0; i < sides; i++) {
                    const angle = (Math.PI * 2 * i) / sides;
                    verts.push({
                        x: x + rx * Math.cos(angle),
                        y: y + ry * Math.sin(angle)
                    });
                }
                return Matter.Bodies.fromVertices(x, y, verts, options, true);
            }

            var initial = 25;
            var temperature;
            var molecules = [];
            var probability;
            var counterGas = 0;

            function setup() {
                engine = Engine.create();
                world = engine.world;
                engine.gravity.scale = 0;

                createCanvas(800, 600);

                for (var i = 0; i < 10; i++){
                    molecules.push(new water(random(50,width-50),random(height/2 + 31.25,height - 50)))
                }

                let walls = {
                    isStatic: true,
                    collisionFilter: { category: WALL }
                };

                let sideWalls = {
                    isStatic: true,
                    collisionFilter: { category: WALL, mask: LIQUID | GAS }
                };

                World.add(world, [
                    Bodies.rectangle(width/2, height+50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS}
                    }),
                    Bodies.rectangle(width/2, -50, width, 100, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    }),

                    // left + right walls (both states collide)
                    Bodies.rectangle(-50, height/2, 100, height, sideWalls),
                    Bodies.rectangle(width+50, height/2, 100, height, sideWalls),

                    // middle wall
                    Bodies.rectangle(width/2, height/2, width, 20, {
                        isStatic: true,
                        collisionFilter: { category: WALL, mask: LIQUID | GAS }
                    })
                ]);

                engine.world.bounds = {
                    min: { x: 0, y: 0 },
                    max: { x: width, y: height }
                };

                frameRate(60); // p5js framerate
                Engine.update(engine, 1000 / 60); // matter js framerate

                Runner.run(engine);

                Matter.Events.on(engine, "collisionStart", event => {
                    for (const pair of event.pairs) {
                        const A = pair.bodyA;
                        const B = pair.bodyB;

                        // Only react if both are water molecules
                        if (A.label === "water" && B.label === "water") {

                            const vA = A.velocity;
                            const vB = B.velocity;

                            const relCollisionSpeed = Math.hypot(vA.x - vB.x, vA.y - vB.y);

                            if (relCollisionSpeed > 15) {
                                triggerReaction(A.parentObject, B.parentObject);
                            }
                        }
                    }
                });
            }

            function draw() {
                temperature = initial + " °C";

                probability = min(frameCount / 4, 500);

                background(200, 200, 255);

                fill(255, 100, 100);
                textSize(50);
                text(temperature, 25, 50);

                fill(100, 100, 255);
                rect(0, height / 2, width);

                // Draw hydrogen bonds
                stroke(150, 150, 255, 200);   // light blue, semi-transparent
                strokeWeight(7.5);

                for (let b of hydrogenBonds) {
                    let p1 = b.a.body.position;
                    let p2 = b.b.body.position;
                    line(p1.x, p1.y, p2.x, p2.y);
                }

                strokeWeight(1);
                stroke(0);


                if (frameCount % 5 == 0 && frameCount > 30) {
                    initial++;
                }

                for (var i = 0; i < molecules.length; i++){
                    let m = molecules[i];

                    m.make();
                    m.movement();

                    // SLOW VELOCITY INCREASE
                    let v = m.body.velocity;
                    let speed = Math.sqrt(v.x*v.x + v.y*v.y);

                    // add a constant amount to speed
                    let newSpeed = speed + 0.05;

                    // normalize direction
                    let nx = v.x / speed;
                    let ny = v.y / speed;

                    // apply new velocity
                    Matter.Body.setVelocity(m.body, {
                        x: nx * newSpeed,
                        y: ny * newSpeed
                    });

                    // H2 and O2 stay in TOP half
                    if (m instanceof h2 || m instanceof o2) {
                        if (m.body.position.y > height / 2) {
                            Matter.Body.setPosition(m.body, {
                                x: m.body.position.x,
                                y: height / 2 - 10
                            });
                            // flip vertical velocity
                            Matter.Body.setVelocity(m.body, {
                                x: m.body.velocity.x,
                                y: -m.body.velocity.y
                            });
                        }
                    }

                    // Water stays in BOTTOM half
                    if (m instanceof water) {
                        if (m.body.position.y < height / 2) {
                            Matter.Body.setPosition(m.body, {
                                x: m.body.position.x,
                                y: height / 2 + 10
                            });
                            // flip vertical velocity
                            Matter.Body.setVelocity(m.body, {
                                x: m.body.velocity.x,
                                y: -m.body.velocity.y
                            });
                        }
                    }

                    handleHydrogenBonds();

                    m.show();
                }
            }

            // runs on sucessful collsion
            function triggerReaction(w1, w2) {
                // Remove old bodies
                World.remove(world, w1.body);
                World.remove(world, w2.body);

                // Remove from array
                molecules = molecules.filter(m => m !== w1 && m !== w2);

                // Position for new molecules
                let pos = w1.body.position;

                // Create new gas molecules using your classes
                let newO2 = new o2(pos.x, pos.y);
                let newH2_1st = new h2(pos.x + 80, pos.y);
                let newH2_2nd = new h2(pos.x + 120, pos.y);

                molecules.push(newO2);
                molecules.push(newH2_1st);
                molecules.push(newH2_2nd);
            }

            function handleHydrogenBonds() {
                const bondDistance = 80;      // when to form a bond
                const breakDistance = 140;    // when to break a bond

                // 1. Try to form new bonds
                for (let i = 0; i < molecules.length; i++) {
                    for (let j = i + 1; j < molecules.length; j++) {

                        let m1 = molecules[i];
                        let m2 = molecules[j];

                        // Only water molecules can hydrogen bond
                        if (!(m1 instanceof water) || !(m2 instanceof water)) continue;

                        // Already bonded?
                        if (hydrogenBonds.some(b => (b.a == m1 && b.b == m2) || (b.a == m2 && b.b == m1))) {
                            continue;
                        }

                        let d = distBodies(m1.body, m2.body);

                        // ⭐ POSITION‑BASED REPULSION ⭐
                        const minDistance = 60;
                        if (d < minDistance) {

                            // vector from m1 → m2
                            let dx = m2.body.position.x - m1.body.position.x;
                            let dy = m2.body.position.y - m1.body.position.y;

                            // normalize direction
                            let mag = Math.sqrt(dx*dx + dy*dy) || 0.0001;
                            dx /= mag;
                            dy /= mag;

                            // repulsive force strength
                            const force = 0.000025 * (minDistance - d);

                            // push them apart along the direction vector
                            Matter.Body.applyForce(m1.body, m1.body.position, { x: -dx * force, y: -dy * force });
                            Matter.Body.applyForce(m2.body, m2.body.position, { x:  dx * force, y:  dy * force });

                            continue; // skip bonding logic for this pair
                        }

                        // close enough to form bond
                        if (d < breakDistance) {
                            // creates the hydrogen bond
                            let c = Matter.Constraint.create({
                                bodyA: m1.body,
                                bodyB: m2.body,
                                length: 150,
                                stiffness: 0.00002,   // weak like real hydrogen bonds
                                damping: 0.02
                            });

                            World.add(world, c);

                            hydrogenBonds.push({ a: m1, b: m2, constraint: c });
                        }
                    }
                }

                // 2. Break bonds that stretch too far
                for (let i = hydrogenBonds.length - 1; i >= 0; i--) {
                    let bond = hydrogenBonds[i];
                    let d = distBodies(bond.a.body, bond.b.body);

                    if (d > breakDistance) {
                        World.remove(world, bond.constraint);
                        hydrogenBonds.splice(i, 1);
                    }
                }
            }

            function distBodies(b1, b2) {
                let dx = b1.position.x - b2.position.x;
                let dy = b1.position.y - b2.position.y;
                return Math.sqrt(dx*dx + dy*dy);
            }


        </script>
    </body>
